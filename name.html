<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">

<title>이름 입력</title>

<style>

* {
    box-sizing:border-box;
}


body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd6e7,#fff);
    font-family:"Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
}


.card {

    width:90%;
    max-width:420px;

    height:300px;

    background:white;

    border-radius:25px;

    display:flex;
    flex-direction:column;

    justify-content:center;
    align-items:center;

    box-shadow:0 10px 30px rgba(0,0,0,0.15);

}


h1 {

    font-size:28px;

    margin-bottom:35px;

    font-weight:700;

}


input {

    width:70%;

    height:45px;

    border:1px solid #ddd;

    border-radius:25px;

    padding:0 20px;

    font-size:16px;

    text-align:center;

}


button {

    margin-top:25px;

    width:120px;

    height:45px;

    border:none;

    border-radius:25px;

    background:#ff6699;

    color:white;

    font-size:18px;

    cursor:pointer;

}


button:hover {

    transform:scale(1.05);

}


</style>

</head>


<body>


<div class="card">

<h1>
이름을 알려줘 😊
</h1>


<input 
id="name"
placeholder="이름 입력">


<button onclick="next()">
확인
</button>


</div>



<script>


function next(){

    const name =
    document.getElementById("name").value.trim();


    if(name === ""){

        alert("이름을 입력해줘!");

        return;

    }


    localStorage.setItem("name", name);


    location.href="date.html";

}


</script>


</body>
</html>
