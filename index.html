<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>놀자아</title>

<style>

* {
    box-sizing: border-box;
}

body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd6e7,#fff);
    font-family:Arial, sans-serif;
}


.card {
    width:90%;
    max-width:420px;
    height:300px;

    background:white;
    border-radius:25px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}


h1 {
    font-size:30px;
    margin-bottom:50px;
    text-align:center;
}


.buttons {
    display:flex;
    gap:30px;
}


button {
    width:110px;
    height:45px;
    border:none;
    border-radius:25px;
    font-size:18px;
    cursor:pointer;
}

@media(max-width:480px){

    h1 {
        font-size:24px;
        margin-bottom:40px;
    }

    .buttons {
        gap:20px;
    }

    button {
        width:100px;
        height:42px;
        font-size:16px;
    }

}

#yes {
    background:#ff6699;
    color:white;
}


#no {
    background:#dddddd;
    position:relative;
    transition:0.25s;
    touch-action:none;
}
</style>

</head>


<body>


<div class="card">

<h1>나랑 놀러 가는 거 어때? </h1>


<div class="buttons">

<button id="yes" onclick="goDate()">
수락
</button>


<button id="no">
거절
</button>


</div>


</div>



<script>


const no = document.getElementById("no");


function moveNo(){

    let x = Math.random() * 400 - 200;
    let y = Math.random() * 250 - 125;

    no.style.transform =
    `translate(${x}px, ${y}px)`;

}


// PC
no.addEventListener("mouseover", moveNo);


// 모바일
no.addEventListener("touchstart", function(e){

    e.preventDefault();
    moveNo();

});


function goDate(){

    location.href="date.html";

}



function goDate(){

    location.href="date.html";

}


</script>


</body>
</html>
